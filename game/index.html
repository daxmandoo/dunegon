<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunegon 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby">
        <h1>Dunegon 3D</h1>
        <p id="lobby-subtitle">A first-person dungeon crawler</p>
        <div class="lobby-btn-group">
            <button onclick="startSolo()">&#9654; Play Solo</button>
            <button onclick="hostGame()" class="btn-host">&#127757; Host Online</button>
        </div>
        <div id="host-code-area" style="display:none;">
            <p class="code-label">Your invite code (share with friends worldwide):</p>
            <div id="room-code">---</div>
            <div class="invite-btn-row">
                <button onclick="copyCode()" id="copy-code-btn">&#128203; Copy Code</button>
                <button onclick="inviteViaSteam()" id="steam-invite-btn">&#127381; Invite via Steam Chat</button>
            </div>
        </div>
        <div class="lobby-join">
            <input id="join-code" type="text" placeholder="Paste code here..." autocomplete="off" />
            <button onclick="joinGame()">Join Game</button>
        </div>
        <div id="lobby-status"></div>
    </div>

    <div id="hud">
        <div id="status"></div>
        <div id="crosshair">+</div>
        <canvas id="minimap-canvas" width="160" height="160"></canvas>
        <div id="health-bar-wrap">
            <div id="health-label">HP</div>
            <div id="health-bar"><div id="health-fill"></div></div>
        </div>
        <div id="sprint-bar-wrap">
            <div id="sprint-label">SPRINT</div>
            <div id="sprint-bar"><div id="sprint-fill"></div></div>
        </div>
        <div id="controls">W/S: Move &nbsp;|&nbsp; A/D: Strafe &nbsp;|&nbsp; Mouse: Look &nbsp;|&nbsp; SHIFT: Sprint &nbsp;|&nbsp; E: Attack &nbsp;|&nbsp; R: Restart &nbsp;|&nbsp; ESC: Unlock</div>
    </div>

    <div id="vignette"></div>
    <div id="float-numbers"></div>
    <div id="fps-counter"></div>

    <!-- Pause Menu -->
    <div id="pause-menu">
        <h2>PAUSED</h2>
        <button onclick="resumeGame()">Resume</button>
        <button onclick="quitToLobby()">Quit to Lobby</button>
    </div>

    <canvas id="dungeon-canvas"></canvas>
    <div id="dmg-flash"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
